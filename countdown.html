<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Date Night - Eddie & Erika</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #4a1942 60%, #1a0a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  .hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart {
    position: absolute;
    bottom: -60px;
    animation: floatUp linear infinite;
    opacity: 0;
    font-size: 24px;
    filter: drop-shadow(0 0 6px rgba(255, 105, 135, 0.5));
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
    10%  { opacity: 0.7; }
    50%  { opacity: 0.5; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
    width: 100%;
  }

  .names {
    font-family: 'Pacifico', cursive;
    font-size: 2.8rem;
    background: linear-gradient(90deg, #ff6b9d, #ffa3c4, #ff6b9d);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
    margin-bottom: 0.3rem;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% center; }
    50% { background-position: 200% center; }
  }

  .subtitle {
    font-size: 1.1rem;
    color: #c9a0dc;
    margin-bottom: 1.5rem;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .countdown-label {
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: #e0b0ff;
    margin-bottom: 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
  }

  .countdown-label .static-text {
    white-space: nowrap;
  }

  .countdown-label .rotating-wrapper {
    position: relative;
    display: block;
    width: 100%;
    height: 1.8rem;
    text-align: center;
  }

  .countdown-label .rotating-text {
    position: absolute;
    left: 0;
    right: 0;
    white-space: nowrap;
    font-style: italic;
    color: #ffa3c4;
    opacity: 0;
    animation: fadeTagline 9s ease-in-out infinite;
  }

  .countdown-label .rotating-text:nth-child(1) { animation-delay: 0s; }
  .countdown-label .rotating-text:nth-child(2) { animation-delay: 3s; }
  .countdown-label .rotating-text:nth-child(3) { animation-delay: 6s; }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
    flex-wrap: nowrap;
  }

  .time-block {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 107, 157, 0.25);
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    min-width: 90px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(255, 107, 157, 0.1);
    transition: transform 0.3s ease;
  }

  .time-block:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(255, 107, 157, 0.2);
  }

  .time-value {
    font-size: 3rem;
    font-weight: 600;
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, #ffa3c4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .time-unit {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #c9a0dc;
    margin-top: 0.4rem;
  }


  @keyframes fadeTagline {
    0%, 5%   { opacity: 0; transform: translateY(10px); }
    10%, 27% { opacity: 1; transform: translateY(0); }
    33%, 38% { opacity: 0; transform: translateY(-10px); }
    100%     { opacity: 0; }
  }

  .event-details {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    backdrop-filter: blur(10px);
  }

  .event-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
    color: #ffd6e7;
  }

  .event-time {
    font-size: 1rem;
    color: #c9a0dc;
    margin-bottom: 0.8rem;
  }

  .event-location a {
    color: #ff9ec5;
    text-decoration: none;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.3s ease;
  }

  .event-location a:hover {
    color: #ffd6e7;
    text-decoration: underline;
  }

  .event-location .pin { font-style: normal; }

  .arrived {
    font-family: 'Pacifico', cursive;
    font-size: 2.5rem;
    color: #ff6b9d;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb.pink {
    width: 300px; height: 300px;
    background: #ff6b9d;
    top: 10%; left: 10%;
    animation: drift1 8s ease-in-out infinite;
  }

  .glow-orb.purple {
    width: 250px; height: 250px;
    background: #a855f7;
    bottom: 15%; right: 10%;
    animation: drift2 10s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 30px); }
  }

  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, -40px); }
  }

  @media (max-width: 480px) {
    .names { font-size: 2rem; }
    .time-value { font-size: 2.2rem; }
    .time-block { min-width: 72px; padding: 1rem; }
    .countdown { gap: 0.7rem; }
  }
</style>
</head>
<body>

<div class="glow-orb pink"></div>
<div class="glow-orb purple"></div>

<div class="hearts-container" id="hearts"></div>

<div class="content">
  <div class="names">Eddie & Erika</div>
  <div class="subtitle">Countdown to Date Night</div>

  <div class="countdown-label">
    <span class="static-text">Time until...</span>
    <span class="rotating-wrapper">
      <span class="rotating-text">Kisses & Cuddles 💋</span>
      <span class="rotating-text">Pub Subs & Back Rubs 🥖✨</span>
      <span class="rotating-text">Dinner & "a movie" 🎬</span>
    </span>
  </div>

  <div class="countdown" id="countdown">
    <div class="time-block">
      <div class="time-value" id="hours">--</div>
      <div class="time-unit">Hours</div>
    </div>
    <div class="time-block">
      <div class="time-value" id="minutes">--</div>
      <div class="time-unit">Minutes</div>
    </div>
    <div class="time-block">
      <div class="time-value" id="seconds">--</div>
      <div class="time-unit">Seconds</div>
    </div>
  </div>

  <div class="event-details">
    <div class="event-title">Dinner & "a movie"</div>
    <div class="event-time">Tomorrow &bull; 6:00 &ndash; 9:00 PM</div>
    <div class="event-location">
      <a href="https://www.google.com/maps/search/?api=1&query=18921+Fishermans+Bend+Dr+Lutz+FL+33558" target="_blank" rel="noopener">
        <span class="pin">📍</span> 18921 Fishermans Bend Dr, Lutz, FL 33558
      </a>
    </div>
  </div>
</div>

<script>
  // Target: March 24, 2026, 6:00 PM EST (UTC-5)
  const targetDate = new Date('2026-03-24T18:00:00-05:00');

  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const countdownEl = document.getElementById('countdown');

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      countdownEl.innerHTML = '<div class="arrived">It\'s Date Night! 💕</div>';
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    hoursEl.textContent = String(h).padStart(2, '0');
    minutesEl.textContent = String(m).padStart(2, '0');
    secondsEl.textContent = String(s).padStart(2, '0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Floating hearts
  const heartsContainer = document.getElementById('hearts');
  const heartEmojis = ['💕', '💗', '💖', '💘', '💝', '❤️', '🩷', '✨'];

  function createHeart() {
    const heart = document.createElement('span');
    heart.classList.add('heart');
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (6 + Math.random() * 8) + 's';
    heartsContainer.appendChild(heart);

    setTimeout(() => heart.remove(), 14000);
  }

  // Stagger initial hearts
  for (let i = 0; i < 8; i++) {
    setTimeout(createHeart, i * 400);
  }
  setInterval(createHeart, 1200);
</script>

</body>
</html>
